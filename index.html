<!DOCTYPE html>
<html>
<head>
    <title>Google Docs</title>
    <link rel="icon" type="image/x-icon" href="https://gstatic.com">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #ffffff; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
    <!-- This script allows us to bypass the "Refused to Connect" error -->
    <script type="module" src="https://unpkg.com"></script>
</head>
<body>

    <!-- We added 'is="x-frame-bypass"' to the iframe tag -->
    <iframe is="x-frame-bypass" src="https://paxhistoria.co"></iframe>

</body>
</html>
